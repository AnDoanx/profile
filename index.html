<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Khoa An</title>

<style>
/* ===== POPUP NGẦU ===== */
#welcomeOverlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, rgba(0,255,255,.2), #000);
  backdrop-filter:blur(14px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.welcomeBox{
  text-align:center;
  padding:40px 30px;
  border-radius:20px;
  background:rgba(0,40,60,.7);
  border:1px solid rgba(0,255,255,.4);
  box-shadow:0 0 60px rgba(0,255,255,.5);
  animation:pop .5s ease;
}

.welcomeBox h2{
  color:#00ffff;
  text-shadow:0 0 20px #00ffff;
  font-size:22px;
}

.welcomeBox p{
  color:#ddd;
  margin:10px 0 20px;
}

.welcomeBox button{
  padding:12px 24px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#00ffff,#0099ff);
  box-shadow:0 0 25px #00ffff;
  transition:.3s;
}

.welcomeBox button:hover{
  transform:scale(1.1);
  box-shadow:0 0 40px #00ffff;
}

@keyframes pop{
  from{transform:scale(.6);opacity:0}
  to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<!-- POPUP -->
<div id="welcomeOverlay">
  <div class="welcomeBox">
    <h2>✨ Xin chào Khoa An ✨</h2>
    <p>Chào mừng đến với bio coder 😎</p>
    <button id="enterBtn">🚀 Bắt đầu</button>
  </div>
</div>

<!-- WEB CỦA BẠN -->
<h1 style="text-align:center;color:white;margin-top:120px">
  BIO KHOA AN 😎
</h1>

<audio id="backgroundAudio" loop>
  <source src="https://files.catbox.moe/rp5kuq.mp3">
</audio>

<script>
// ===== MUSIC =====
const audio = document.getElementById("backgroundAudio");

function playMusic(){
  audio.play().catch(()=>{});
}

// ===== POPUP =====
const overlay = document.getElementById("welcomeOverlay");
const btn = document.getElementById("enterBtn");

btn.onclick = () => {
  overlay.style.opacity = "0";
  overlay.style.transform = "scale(1.1)";
  setTimeout(()=> overlay.remove(), 400);
  playMusic();
};
</script>

</body>
</html>
